kind = "web"
previewPath = "/"
title = "Ace Digital"
version = "1.0.0"
id = "artifacts/ace-digital-os"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21973

[services.development]
run = "pnpm --filter @workspace/ace-digital-os run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ace-digital-os", "run", "build" ]
publicDir = "artifacts/ace-digital-os/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21973"
BASE_PATH = "/"
