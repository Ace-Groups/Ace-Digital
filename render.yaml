# Ace Digital OS — single Render REST API service
# Connect repo in Render Dashboard → New Blueprint or link render.yaml
#
# Required secrets (Render Dashboard → Environment):
#   JWT_SECRET                     — 32+ random chars (match Firebase if sharing tokens)
#   FIREBASE_SERVICE_ACCOUNT_JSON  — full Firebase Admin JSON (one line)
#   RESEND_API_KEY                 — Resend API key (re_...) from https://resend.com/api-keys
#   EMAIL_FROM                     — sender address with domain verified in Resend
#                                      Example: "Ace-Digital <no-reply@acedigital.com>"

services:
  - type: web
    name: ace-digital-api
    runtime: node
    plan: free
    region: singapore
    buildCommand: bash scripts/render-build.sh
    startCommand: node --enable-source-maps artifacts/api-server/dist/index.mjs
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: USE_FIRESTORE
        value: "true"
      - key: GCLOUD_PROJECT
        value: ace-digital-os
      - key: FIREBASE_PROJECT_ID
        value: ace-digital-os
      - key: JWT_SECRET
        sync: false
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: CORS_ORIGINS
        value: https://ace-digital-os.web.app,https://ace-digital-os.firebaseapp.com
      - key: REDIS_URL
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: APP_LOGIN_URL
        value: https://ace-digital-os.web.app/login
      - key: FIREBASE_WEB_PUSH_VAPID_KEY
        sync: false
      - key: SKIP_INSTALL_DEPS
        value: "true"
